<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Outer Blue Glow/Base -->
    <radialGradient id="outerBlue" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </radialGradient>
    
    <!-- Inner Pink Card -->
    <linearGradient id="innerPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E11D48;stop-opacity:1" />
    </linearGradient>

    <!-- Glossy Highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Blue Circular Base -->
  <circle cx="256" cy="256" r="240" fill="url(#outerBlue)" />
  <circle cx="256" cy="256" r="240" fill="url(#gloss)" opacity="0.3" />
  
  <!-- Outer Rim Shadow -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="4" />

  <!-- Pink Rounded Square -->
  <rect x="128" y="156" width="256" height="200" rx="48" fill="url(#innerPink)" filter="drop-shadow(0 10px 20px rgba(0,0,0,0.3))" />
  
  <!-- Book Icon (Simplified) -->
  <g transform="translate(166, 196) scale(0.35)">
    <path d="M120 180 C 120 150, 180 150, 256 180 C 332 150, 392 150, 392 180 V 380 C 392 410, 332 410, 256 380 C 180 410, 120 410, 120 380 Z" fill="white"/>
    <path d="M256 180 V 380" stroke="#E11D48" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Music Note on Book -->
    <g transform="translate(256, 260) scale(1.4)">
      <path d="M0 0 V 40" stroke="#E11D48" stroke-width="14" stroke-linecap="round"/>
      <circle cx="-16" cy="40" r="20" fill="#E11D48"/>
      <path d="M0 5 L 30 -5" stroke="#E11D48" stroke-width="14" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text Branding (from Image 1 style) -->
  <text x="256" y="110" font-family="serif" font-size="42" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.5);">Bek Na Lah</text>
  <text x="256" y="420" font-family="sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle" letter-spacing="4" opacity="0.9">GOSPEL SONG BOOK</text>
</svg>
